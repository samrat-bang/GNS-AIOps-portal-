<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found — GNS AIOps Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--navy:#0d1f3c;--blue:#1d6ef5;--text:#1a2332;--text2:#4a5568;--text3:#a0aec0;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:grid;place-items:center;padding:20px}
.box{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.08);padding:48px 44px;max-width:480px;text-align:center}
.icon{width:64px;height:64px;background:#e8f0fe;border-radius:50%;display:grid;place-items:center;margin:0 auto 20px}
.icon svg{width:32px;height:32px;fill:none;stroke:var(--blue);stroke-width:2}
.code{font-family:var(--mono);font-size:13px;color:var(--text3);letter-spacing:1px;margin-bottom:6px}
h1{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
.desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:#fff;padding:11px 22px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;box-shadow:0 1px 4px rgba(29,110,245,.25);transition:all .15s}
.btn:hover{background:#1558d6;transform:translateY(-1px)}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
.foot{margin-top:24px;font-size:11px;color:var(--text3);font-family:var(--mono)}
</style>
</head>
<body>
<div class="box">
  <div class="icon">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <div class="code">ERROR · 404</div>
  <h1>Page not found</h1>
  <p class="desc">The page you were looking for does not exist on the GNS AIOps Portal. Head back to the main dashboard to continue.</p>
  <a class="btn" href="/GNS-AIOps-portal/">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to dashboard
  </a>
  <div class="foot">GNS AIOps Portal · v5 · Cognizant</div>
</div>
</body>
</html>
